<!DOCTYPE html>
<html>

<body style="font-family: sans-serif; padding: 20px;">
    <h3>Generator Hash SHA-256</h3>
    <input type="text" id="p" placeholder="Ketik Password Anda" style="padding:10px; width:300px;">
    <button onclick="gen()">Generate</button>
    <p><b>Hasil (Salin ini ke Google Sheet):</b></p>
    <code id="out" style="background:#eee; padding:10px; display:block; word-break:break-all;"></code>
    <script>
        async function gen() {
            const p = document.getElementById('p').value;
            const msgBuffer = new TextEncoder().encode(p);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            document.getElementById('out').innerText = hashHex;
        }
    </script>
</body>

</html>
